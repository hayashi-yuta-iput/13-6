<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="lp">
    <div class="nav">
      <div class="nav-inner">
        <p class="nav-logo">ロゴ</p>
        <button class="btn btn-dark">Button</button>
      </div>
    </div>

    <div class="hero">
      <p class="hero-heading">大見出し</p>
      <p class="hero-sub">一言</p>
      <div class="actions">
        <button class="btn btn-dark">Button</button>
        <button class="btn btn-light">Button</button>
      </div>
    </div>

    <div class="features">
      <div class="features-inner">
        <p class="features-heading">見出し</p>
        <div class="cards">
          <div class="card">
            <div class="card-thumb">
              <span class="card-thumb-label">Simple</span>
            </div>
            <div class="card-body">
              <p class="card-title">ワイヤレスイヤホン</p>
              <div class="card-desc">
                <p>軽量で長時間再生できるBluetoothイヤホン。</p>
              </div>
              <p class="card-price">￥4,980</p>
              <button class="btn-buy"><span>購入する</span></button>
            </div>
          </div>
          <div class="card">
            <div class="card-thumb">
              <span class="card-thumb-label">Design</span>
            </div>
            <div class="card-body">
              <p class="card-title">ワイヤレスイヤホン</p>
              <div class="card-desc">
                <p>軽量で長時間再生できるBluetoothイヤホン。</p>
              </div>
              <p class="card-price">￥4,980</p>
              <button class="btn-buy"><span>購入する</span></button>
            </div>
          </div>
          <div class="card">
            <div class="card-thumb">
              <span class="card-thumb-label">System</span>
            </div>
            <div class="card-body">
              <p class="card-title">ワイヤレスイヤホン</p>
              <div class="card-desc">
                <p>軽量で長時間再生できるBluetoothイヤホン。</p>
              </div>
              <p class="card-price">￥4,980</p>
              <button class="btn-buy"><span>購入する</span></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="cta">
      <div class="cta-inner">
        <p class="cta-heading">見出し</p>
        <button class="btn btn-light">Button</button>
      </div>
    </div>

    <div class="footer">
      <p>デザイン土台：Figma's Simple Design System UI Kit is licensed by Figma under CC BY 4.0</p>
    </div>
  </div>
</body>
</html>
